name: macOS 14 — Dia Bundle Inspection

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  inspect:
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: System info
        run: sw_vers && uname -m

      - name: Download and install Dia
        run: |
          curl -L --progress-bar \
            https://releases.diabrowser.com/release/Dia-latest.dmg \
            -o /tmp/Dia.dmg
          hdiutil attach /tmp/Dia.dmg -quiet -nobrowse
          DIA_VOL=$(ls /Volumes/ | grep -i dia | head -1)
          echo "Volume: $DIA_VOL"
          cp -R "/Volumes/$DIA_VOL/Dia.app" /Applications/
          hdiutil detach "/Volumes/$DIA_VOL" -quiet || true
          echo "Installed: $(ls -la /Applications/Dia.app)"

      - name: Inspect Dia bundle
        run: |
          APP=/Applications/Dia.app
          echo "=== VERSION ==="
          defaults read "$APP/Contents/Info.plist" CFBundleShortVersionString 2>/dev/null
          defaults read "$APP/Contents/Info.plist" CFBundleVersion 2>/dev/null

          echo "=== INFO.PLIST (full) ==="
          cat "$APP/Contents/Info.plist"

          echo "=== EMBEDDED STRINGS — URLs/domains ==="
          # Grep binary for http/wss endpoints across the whole bundle
          grep -rao 'https\?://[^"[:space:]\\]*' "$APP/Contents/MacOS/"* 2>/dev/null | sort -u | head -100
          grep -rao 'wss\?://[^"[:space:]\\]*' "$APP/Contents/MacOS/"* 2>/dev/null | sort -u | head -50

          echo "=== EMBEDDED STRINGS — API/telemetry keywords ==="
          strings "$APP/Contents/MacOS/"* 2>/dev/null | grep -iE "(telemetry|analytics|sentry|datadog|segment|amplitude|mixpanel|posthog|api\.|endpoint|graphql|grpc)" | sort -u | head -100

          echo "=== ENTITLEMENTS ==="
          codesign -d --entitlements - "$APP" 2>/dev/null || echo "no entitlements or unsigned"

          echo "=== CODE SIGNATURE ==="
          codesign -dv "$APP" 2>&1 | head -20

          echo "=== NETWORK PERMISSIONS ==="
          cat "$APP/Contents/Info.plist" | grep -A2 -iE "(NSAppTransport|NSAllowsArbitrary|Privacy|Network|Bluetooth|Location|Camera|Microphone)" || echo "none found"

          echo "=== BUNDLE FRAMEWORKS/DYLIBS ==="
          ls "$APP/Contents/Frameworks/" 2>/dev/null | head -50
          ls "$APP/Contents/PlugIns/" 2>/dev/null | head -20

          echo "=== DONE ==="

      - name: Upload inspection output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dia-bundle-inspection
          path: |
            /tmp/dia-inspection.txt
          retention-days: 3

      - name: Save inspection to file
        if: always()
        run: |
          APP=/Applications/Dia.app
          {
            echo "=== VERSION ==="
            defaults read "$APP/Contents/Info.plist" CFBundleShortVersionString 2>/dev/null
            defaults read "$APP/Contents/Info.plist" CFBundleVersion 2>/dev/null
            echo "=== INFO.PLIST ==="
            cat "$APP/Contents/Info.plist" 2>/dev/null
            echo "=== URLS ==="
            grep -rao 'https\?://[^"[:space:]\\]*' "$APP/Contents/MacOS/"* 2>/dev/null | sort -u
            grep -rao 'wss\?://[^"[:space:]\\]*' "$APP/Contents/MacOS/"* 2>/dev/null | sort -u
            echo "=== TELEMETRY STRINGS ==="
            strings "$APP/Contents/MacOS/"* 2>/dev/null | grep -iE "(telemetry|analytics|sentry|datadog|segment|amplitude|mixpanel|posthog|api\.|endpoint|graphql|grpc)" | sort -u
            echo "=== ENTITLEMENTS ==="
            codesign -d --entitlements - "$APP" 2>/dev/null
            echo "=== CODE SIG ==="
            codesign -dv "$APP" 2>&1
            echo "=== FRAMEWORKS ==="
            ls "$APP/Contents/Frameworks/" 2>/dev/null
          } > /tmp/dia-inspection.txt 2>&1
          echo "Inspection saved: $(wc -l /tmp/dia-inspection.txt) lines"
