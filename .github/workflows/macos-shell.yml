name: macOS 14 — Dia First-Launch Capture

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  capture:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: System info
        run: |
          sw_vers && uname -m
          networksetup -listallnetworkservices

      - name: Install mitmproxy
        run: brew install mitmproxy

      - name: Generate mitmproxy CA cert
        run: |
          # mitmdump is non-interactive — generates cert and exits cleanly
          mitmdump --listen-port 8080 &
          MITM_PID=$!
          sleep 8
          kill $MITM_PID 2>/dev/null || true
          wait $MITM_PID 2>/dev/null || true
          ls -la ~/.mitmproxy/
          sudo security add-trusted-cert -d -r trustRoot \
            -k /Library/Keychains/System.keychain \
            ~/.mitmproxy/mitmproxy-ca-cert.pem
          echo "Cert installed"
          security find-certificate -c mitmproxy /Library/Keychains/System.keychain | head -3

      - name: Configure system proxy
        run: |
          SERVICE=$(networksetup -listallnetworkservices | grep -v '^\*' | grep -v 'An asterisk' | head -1 | tr -d '\r')
          echo "Using service: '$SERVICE'"
          sudo networksetup -setwebproxy "$SERVICE" 127.0.0.1 8080
          sudo networksetup -setsecurewebproxy "$SERVICE" 127.0.0.1 8080
          networksetup -getwebproxy "$SERVICE"
          networksetup -getsecurewebproxy "$SERVICE"

      - name: Download and install Dia
        run: |
          curl -L --progress-bar \
            https://releases.diabrowser.com/release/Dia-latest.dmg \
            -o /tmp/Dia.dmg
          hdiutil attach /tmp/Dia.dmg -quiet -nobrowse
          DIA_VOL=$(ls /Volumes/ | grep -i dia | head -1)
          echo "Volume: $DIA_VOL"
          ls "/Volumes/$DIA_VOL/"
          cp -R "/Volumes/$DIA_VOL/Dia.app" /Applications/
          hdiutil detach "/Volumes/$DIA_VOL" -quiet || true
          ls -la /Applications/Dia.app

      - name: Capture Dia first-launch traffic
        run: |
          # Start mitmdump writing to file
          mitmdump -w /tmp/dia-traffic.mitm --listen-port 8080 &
          MITM_PID=$!
          echo "mitmdump PID: $MITM_PID"
          sleep 3

          # Launch Dia
          echo "Launching Dia..."
          open -a Dia
          echo "Dia launched, capturing 90s of traffic..."
          sleep 90

          # Screenshot
          screencapture -x /tmp/dia-screenshot.png
          echo "Screenshot saved"

          # Stop mitmdump
          kill $MITM_PID 2>/dev/null || true
          wait $MITM_PID 2>/dev/null || true

          echo "Capture complete."
          ls -lh /tmp/dia-traffic.mitm /tmp/dia-screenshot.png || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dia-first-launch
          path: |
            /tmp/dia-traffic.mitm
            /tmp/dia-screenshot.png
          retention-days: 3
