name: macOS 14 Shell (Dia Testing)

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  shell:
    runs-on: macos-14
    timeout-minutes: 360

    steps:
      - name: System info
        run: |
          echo "=== SYSTEM ==="
          sw_vers
          uname -m
          sysctl -n hw.memsize | awk '{print $1/1024/1024/1024 " GB RAM"}'

      - name: Install mitmproxy
        run: brew install mitmproxy

      - name: Start tmate and capture SSH string
        run: |
          # Install tmate
          brew install tmate
          # Start tmate and capture the session info
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready
          SSH_CONN=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}')
          WEB_URL=$(tmate -S /tmp/tmate.sock display -p '#{tmate_web}')
          echo "=== TMATE SESSION ==="
          echo "SSH: $SSH_CONN"
          echo "WEB: $WEB_URL"
          echo "SSH_CONN=$SSH_CONN" >> "$GITHUB_ENV"
          echo "WEB_URL=$WEB_URL" >> "$GITHUB_ENV"
          # Write to step summary
          echo "## macOS 14 Shell Session" >> "$GITHUB_STEP_SUMMARY"
          echo "- **SSH:** \`$SSH_CONN\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Web:** $WEB_URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Attach to tmate session
        run: |
          echo "Session active. Connect with:"
          echo "  $SSH_CONN"
          echo "  Or web: $WEB_URL"
          # Hold the session open
          tmate -S /tmp/tmate.sock attach-session -t default || true
          # Fallback: wait
          sleep 21600
