name: macOS 14 Shell (Dia Testing)

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  shell:
    runs-on: macos-14
    timeout-minutes: 360

    steps:
      - name: System info
        run: |
          sw_vers
          uname -m
          sysctl -n hw.memsize | awk '{print $1/1024/1024/1024 " GB RAM"}'

      - name: Install mitmproxy
        run: brew install mitmproxy

      - name: Interactive tmate session
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
