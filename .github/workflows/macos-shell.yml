name: macOS 14 — Dia Signup Provisioning

on:
  workflow_dispatch:
  push:
    branches: [master]

env:
  DIA_LOGIN_EMAIL: ${{ secrets.DIA_LOGIN_EMAIL }}
  DIA_LOGIN_PASSWORD: ${{ secrets.DIA_LOGIN_PASSWORD }}
  AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}

jobs:
  capture:
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: System info
        run: sw_vers && uname -m && networksetup -listallnetworkservices

      - name: Mask secrets in log
        run: |
          echo "::add-mask::$DIA_LOGIN_EMAIL"
          echo "::add-mask::$DIA_LOGIN_PASSWORD"
          echo "::add-mask::$AGENTMAIL_API_KEY"

      - name: Install mitmproxy + agentmail
        run: |
          brew install mitmproxy
          python3 -m venv /tmp/agentmail-venv
          /tmp/agentmail-venv/bin/pip install --quiet agentmail==0.4.15 websockets requests

      - name: Generate mitmproxy cert
        run: |
          timeout 20 mitmdump --listen-port 8080 &
          MITM_PID=$!
          sleep 8
          kill -9 $MITM_PID 2>/dev/null || true
          wait $MITM_PID 2>/dev/null || true
          ls -la ~/.mitmproxy/ && echo "cert ready" || echo "cert dir missing"

      - name: Download and install Dia
        run: |
          curl -L --progress-bar https://releases.diabrowser.com/release/Dia-latest.dmg -o /tmp/Dia.dmg
          hdiutil attach /tmp/Dia.dmg -quiet -nobrowse
          DIA_VOL=$(ls /Volumes/ | grep -i dia | head -1)
          cp -R "/Volumes/$DIA_VOL/Dia.app" /Applications/
          hdiutil detach "/Volumes/$DIA_VOL" -quiet || true
          echo "Dia version: $(defaults read /Applications/Dia.app/Contents/Info.plist CFBundleShortVersionString)"

      - name: Bypass Gatekeeper
        run: |
          xattr -dr com.apple.quarantine /Applications/Dia.app
          sudo spctl --master-disable
          xattr /Applications/Dia.app 2>&1 | grep quarantine && echo "WARNING: quarantine not cleared" || echo "quarantine cleared"
          spctl --status || true

      - name: Capture Dia signup flow
        run: |
          mitmdump -w /tmp/dia-traffic.mitm --listen-port 8080 &
          MITM_PID=$!
          echo "Waiting for mitmdump to start listening..."
          until nc -z 127.0.0.1 8080 2>/dev/null; do sleep 1; done
          echo "mitmdump ready. Launching Dia..."
          /Applications/Dia.app/Contents/MacOS/Dia \
            --proxy-server=http://127.0.0.1:8080 \
            --proxy-bypass-list="" \
            --ignore-certificate-errors \
            --disable-quic \
            --remote-debugging-port=9222 &
          echo "Waiting 15s for Dia to render initial screen..."
          sleep 15
          screencapture -x /tmp/dia-screenshot-pre-auth.png

          # Write password to temp file — avoids embedding in AppleScript source.
          # AppleScript doesn't support backslash escaping; temp file sidesteps that entirely.
          printf '%s' "$DIA_LOGIN_PASSWORD" > /tmp/.dia-pass
          chmod 600 /tmp/.dia-pass

          echo "Checking Dia process..."
          pgrep -x Dia && echo "Dia is running" || echo "WARNING: Dia not found by pgrep"

          echo "Stage 1: email entry..."
          osascript 2>&1 << 'APPLESCRIPT' || true
          tell application "System Events"
            tell process "Dia"
              set frontmost to true
              delay 2
              try
                set inputField to first text field of front window
                click inputField
                delay 0.5
              end try
              keystroke "digitalgnosis+bcny-dia-prod@wearehackerone.com"
              delay 1
              key code 36
            end tell
          end tell
          APPLESCRIPT
          echo "Stage 1 done"

          echo "Waiting 15s for signin/method response + password form..."
          sleep 15
          screencapture -x /tmp/dia-signup-stage2.png

          # Write password to temp file for top-level do shell script read.
          # do shell script at top level (not inside tell process) works fine on CI.
          # keystroke variable types the full password into the focused field —
          # avoids both pbcopy (no pasteboard in CI) and AppleScript string escaping.
          printf '%s' "$DIA_LOGIN_PASSWORD" > /tmp/.dia-pass
          chmod 600 /tmp/.dia-pass

          echo "Dia process check before Stage 2..."
          pgrep -x Dia && echo "Dia running" || echo "WARNING: Dia not found"

          echo "Stage 2: CDP password entry..."
          cat > /tmp/dia-cdp-signup.py << 'PYEOF'
import asyncio, json, sys, time, os
import requests
import websockets

async def fill_signup_form(password):
    # Poll CDP /json/list until signup tab is visible (up to 45s)
    deadline = time.time() + 45
    ws_url = None
    tab_url = None
    while time.time() < deadline:
        try:
            tabs = requests.get('http://localhost:9222/json/list', timeout=5).json()
            for tab in tabs:
                url = tab.get('url', '')
                if 'diabrowser.engineering' in url:
                    ws_url = tab.get('webSocketDebuggerUrl')
                    tab_url = url
                    break
            if ws_url:
                break
        except Exception as e:
            print(f"CDP poll error: {e}", flush=True)
        time.sleep(3)

    if not ws_url:
        print("ERROR: Dia signup tab not found via CDP after 45s", flush=True)
        sys.exit(1)

    print(f"Attaching CDP: {tab_url}", flush=True)

    async with websockets.connect(ws_url, max_size=10_000_000) as ws:
        cmd_id = 1

        async def cdp(method, params=None):
            nonlocal cmd_id
            mid = cmd_id
            cmd_id += 1
            await ws.send(json.dumps({"id": mid, "method": method, "params": params or {}}))
            # drain responses until we get ours (skip events)
            for _ in range(30):
                raw = await asyncio.wait_for(ws.recv(), timeout=10)
                resp = json.loads(raw)
                if resp.get('id') == mid:
                    return resp
            return None

        await cdp("Runtime.enable")
        await asyncio.sleep(1)

        # Check form is present before filling
        check_js = "document.querySelectorAll('input[type=\"password\"]').length"
        check = await cdp("Runtime.evaluate", {"expression": check_js, "returnByValue": True})
        field_count = check.get('result', {}).get('result', {}).get('value', 0) if check else 0
        print(f"Password fields found: {field_count}", flush=True)
        if field_count < 2:
            print("ERROR: Expected 2 password fields, found fewer — form may not be loaded yet", flush=True)
            sys.exit(1)

        # Escape password for JS string literal
        p = password.replace('\\', '\\\\').replace('"', '\\"')

        fill_js = f"""
(function() {{
  var inputs = document.querySelectorAll('input[type="password"]');
  if (inputs.length < 2) return 'ERR:fields=' + inputs.length;

  // React-controlled input: use nativeInputValueSetter so React sees the change
  var nativeSetter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value').set;

  function reactSet(el, val) {{
    el.focus();
    nativeSetter.call(el, val);
    el.dispatchEvent(new Event('input',  {{bubbles: true, composed: true}}));
    el.dispatchEvent(new Event('change', {{bubbles: true, composed: true}}));
  }}

  reactSet(inputs[0], "{p}");
  reactSet(inputs[1], "{p}");

  // Ensure ToS checkbox is checked
  var boxes = document.querySelectorAll('input[type="checkbox"]');
  var checked = 0;
  for (var i = 0; i < boxes.length; i++) {{
    if (!boxes[i].checked) {{ boxes[i].click(); }}
    checked++;
  }}

  return 'ok:fields=' + inputs.length + ',boxes=' + checked;
}})()
"""
        fill_result = await cdp("Runtime.evaluate", {"expression": fill_js, "returnByValue": True})
        val = fill_result.get('result', {}).get('result', {}).get('value', 'no-result') if fill_result else 'no-result'
        print(f"Fill result: {val}", flush=True)
        if str(val).startswith('ERR'):
            print("ERROR: form fill reported error", flush=True)
            sys.exit(1)

        await asyncio.sleep(1)

        submit_js = """
(function() {
  var btns = document.querySelectorAll('button');
  for (var i = 0; i < btns.length; i++) {
    if (btns[i].textContent.trim().toLowerCase().includes('sign up')) {
      btns[i].click();
      return 'clicked:' + btns[i].textContent.trim();
    }
  }
  var form = document.querySelector('form');
  if (form) { form.requestSubmit(); return 'form.requestSubmit'; }
  return 'ERR:no-submit-found';
})()
"""
        sub_result = await cdp("Runtime.evaluate", {"expression": submit_js, "returnByValue": True})
        sub_val = sub_result.get('result', {}).get('result', {}).get('value', 'no-result') if sub_result else 'no-result'
        print(f"Submit result: {sub_val}", flush=True)

password = open('/tmp/.dia-pass').read().strip()
asyncio.run(fill_signup_form(password))
PYEOF
          /tmp/agentmail-venv/bin/python3 /tmp/dia-cdp-signup.py
          rm -f /tmp/.dia-pass /tmp/dia-cdp-signup.py
          echo "Stage 2 done"

          echo "Signup submitted. Capturing 30s of network traffic..."
          sleep 30
          screencapture -x /tmp/dia-screenshot-post-submit.png

          kill $MITM_PID 2>/dev/null || true
          wait $MITM_PID 2>/dev/null || true
          echo "Capture done."
          ls -lh /tmp/dia-traffic.mitm /tmp/dia-screenshot-pre-auth.png \
                  /tmp/dia-signup-stage2.png /tmp/dia-screenshot-post-submit.png 2>/dev/null || true

      - name: Poll AgentMail for verification email
        run: |
          /tmp/agentmail-venv/bin/python3 - << 'PYEOF'
          import os, sys, time, re, fnmatch

          try:
              from agentmail import AgentMail
          except ImportError:
              print("agentmail not installed — skipping magic-link poll")
              sys.exit(0)

          api_key  = os.environ.get('AGENTMAIL_API_KEY', '')
          inbox_id = 'dg-h1-forward@agentmail.to'
          pattern  = '*bcny-dia-prod*'
          deadline = time.time() + 300  # 5-min hard cap

          if not api_key:
              print("AGENTMAIL_API_KEY not set — skipping magic-link poll")
              sys.exit(0)

          client = AgentMail(api_key=api_key)
          print(f"Polling {inbox_id} for pattern {pattern} (5-min cap)...")

          magic_url  = None
          seen_ids   = set()

          # Baseline — ignore messages already in inbox before this run
          try:
              baseline = client.inboxes.messages.list(inbox_id)
              for m in (baseline.messages or []):
                  seen_ids.add(m.message_id)
              print(f"Baseline: {len(seen_ids)} pre-existing messages skipped")
          except Exception as e:
              print(f"Baseline fetch failed: {e}")

          while time.time() < deadline:
              time.sleep(10)
              try:
                  result = client.inboxes.messages.list(inbox_id)
                  for msg in (result.messages or []):
                      if msg.message_id in seen_ids:
                          continue
                      seen_ids.add(msg.message_id)
                      to_addr = getattr(msg, 'to_', None) or getattr(msg, 'to', '') or ''
                      if not fnmatch.fnmatch(str(to_addr), pattern):
                          continue
                      print(f"Matched message: id={msg.message_id} to={to_addr}")
                      body = getattr(msg, 'text_body', '') or getattr(msg, 'html_body', '') or ''
                      urls = re.findall(r'https?://[^\s<>"\']+', body)
                      for url in urls:
                          url_lower = url.lower()
                          if any(k in url_lower for k in ['verify', 'confirm', 'magic', 'account.diabrowser', 'token', 'activate']):
                              magic_url = url
                              print(f"Magic link found")
                              break
                      if magic_url:
                          break
              except Exception as e:
                  print(f"Poll error: {e}")
              if magic_url:
                  break

          if magic_url:
              with open('/tmp/magic_link.txt', 'w') as f:
                  f.write(magic_url)
              print("Magic link written to /tmp/magic_link.txt")
          else:
              print("No magic link found within 5 min — flow may not require email verification")
          PYEOF

      - name: Open magic link in Dia (if received)
        run: |
          if [ -f /tmp/magic_link.txt ]; then
            echo "::add-mask::$(cat /tmp/magic_link.txt)"
            MAGIC_URL=$(cat /tmp/magic_link.txt)
            echo "Opening magic link in Dia..."
            open "$MAGIC_URL"
            sleep 15
            screencapture -x /tmp/dia-post-verify.png
            echo "Post-verify screenshot captured"
          else
            echo "No magic link file — skipping"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dia-signup-capture
          path: |
            /tmp/dia-traffic.mitm
            /tmp/dia-screenshot-pre-auth.png
            /tmp/dia-signup-stage2.png
            /tmp/dia-screenshot-post-submit.png
            /tmp/dia-post-verify.png
          retention-days: 3
