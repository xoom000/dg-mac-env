name: macOS 14 Shell (Dia Testing)

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  shell:
    runs-on: macos-14
    timeout-minutes: 360

    steps:
      - name: System info
        run: |
          sw_vers
          uname -m
          sysctl -n hw.memsize | awk '{print $1/1024/1024/1024 " GB RAM"}'

      - name: Install mitmproxy
        run: brew install mitmproxy

      - name: Configure mitmproxy CA cert
        run: |
          mitmdump &
          MITM_PID=$!
          sleep 5
          kill $MITM_PID || true
          if [ -f ~/.mitmproxy/mitmproxy-ca-cert.pem ]; then
            sudo security add-trusted-cert -d -r trustRoot \
              -k /Library/Keychains/System.keychain \
              ~/.mitmproxy/mitmproxy-ca-cert.pem
            echo "mitmproxy cert installed"
          else
            echo "cert not found — mitmproxy may not have initialized"
          fi

      - name: Set system HTTPS proxy
        run: |
          SERVICE=$(networksetup -listallnetworkservices | grep -v '\*' | head -1)
          echo "Configuring proxy on: $SERVICE"
          networksetup -setwebproxy "$SERVICE" 127.0.0.1 8080
          networksetup -setsecurewebproxy "$SERVICE" 127.0.0.1 8080

      - name: Interactive tmate session
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
